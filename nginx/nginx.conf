# nginx/nginx.conf
# Nginx как reverse proxy перед Django и React

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Скрыть версию Nginx в headers (информация для атакующих)
    server_tokens off;

    # Логи
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Ограничение размера запроса (защита от больших payload)
    client_max_body_size 5m;

    # Rate limiting на уровне Nginx (дополнение к DRF throttling)
    limit_req_zone $binary_remote_addr zone=login_zone:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=api_zone:10m rate=60r/m;

    server {
        listen 80;
        server_name localhost;

        # Security headers (дублируем здесь для надёжности)
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

        # Для HTTPS (раскомментировать при наличии SSL):
        # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Фронтенд (React SPA)
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # API — проксируем на Django
        location /api/ {
            limit_req zone=api_zone burst=20 nodelay;

            proxy_pass http://backend:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout 30s;
            proxy_read_timeout 30s;
        }

        # Login endpoint — жёсткий rate limit на уровне Nginx
        location /api/login/ {
            limit_req zone=login_zone burst=3 nodelay;

            proxy_pass http://backend:8000/login/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Django Admin — дополнительная защита
        location /admin/ {
            # В production ограничить по IP:
            # allow 192.168.1.0/24;
            # deny all;

            proxy_pass http://backend:8000/admin/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Django static files
        location /static/ {
            proxy_pass http://backend:8000/static/;
            expires 1y;
            add_header Cache-Control "public";
        }
    }

    # HTTPS конфигурация (для production с SSL-сертификатом):
    # server {
    #     listen 443 ssl http2;
    #     server_name yourdomain.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers HIGH:!aNULL:!MD5;
    #     ssl_prefer_server_ciphers on;
    #
    #     # ... остальная конфигурация ...
    # }
}